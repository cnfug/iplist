name: build

on:
  workflow_dispatch:
  schedule:
    - cron: "2 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Checkout Data
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set Timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Parse
        run: |
          # 下载 IP 库（使用 npm 公开包，无需 S3 密钥）
          wget https://cdn.jsdelivr.net/npm/openipdb.ipdb@latest/openipdb.ipdb -O /tmp/openipdb.ipdb
          ls -al /tmp/openipdb.ipdb
          
          rm -r ./data
          pnpm install
          pnpm run build

          # 🔴 构建完成后，替换所有 .md 文件中的地址
          find . -name "*.md" -type f -exec sed -i 's/metowolf.github.io\/iplist/cnfug.github.io\/iplist/g' {} +

          # 验证替换结果（可选）
          grep -r "cnfug.github.io/iplist" --include="*.md" . || true

      - name: Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to the output on this push; exiting."
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "i@i-meto.com"
          git remote set-url origin https://${GH_PAT}@github.com/cnfug/iplist.git
          git add .
          git commit -m "[auto] $(date '+%Y-%m-%d %H:%M:%S')"
          git push
